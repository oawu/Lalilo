<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta http-equiv="Content-Language" content="zh-tw">
    <meta http-equiv="Content-type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,minimal-ui">

    <title>Scroll</title>
    <style type="text/css">
      
      * {
        vertical-align: top;
        -webkit-box-sizing: border-box;
           -moz-box-sizing: border-box;
                box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        text-align: center;
      }
      .section {
        display: inline-block;
        width: 100%;
        height: 100vh;
        line-height: 100vh;
        font-size: 100px;
        border: 1px solid rgba(255, 0, 0, .3);
      }
    </style>

    <script language="javascript" type="text/javascript" src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script language="javascript" type="text/javascript" src="js/index.js"></script>
  </head>
  <body>

    <section id='section-1' class='section'>1</section>
    <section id='section-2' class='section'>2</section>
    <section id='section-3' class='section'>3</section>
    <section id='section-4' class='section'>4</section>
    <section id='section-5' class='section'>5</section>

  </body>
</html>
